<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        /* Жесткие стили, изолированные от старого CSS */
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: #f0f2f5; 
            display: flex !important; 
            justify-content: center !important; 
            align-items: center !important; 
            height: 100vh; 
        }
        
        .new-auth-card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 360px; 
            box-sizing: border-box;
            display: flex !important;
            flex-direction: column !important;
            gap: 20px !important;
            text-align: center;
        }

        .new-auth-card h2 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }

        .new-auth-card form {
            display: flex !important;
            flex-direction: column !important;
            gap: 16px !important; /* Делает одинаковый отступ между ВСЕМИ элементами сверху вниз */
            width: 100% !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .new-auth-card input[type="text"],
        .new-auth-card input[type="password"] { 
            width: 100% !important; 
            padding: 14px 16px !important; 
            border: 1px solid #dee2e6 !important; 
            border-radius: 8px !important; 
            outline: none !important;
            font-size: 15px !important;
            box-sizing: border-box !important;
            display: block !important;
        }

        .new-auth-card input:focus {
            border-color: #3498db !important;
        }

        /* Кнопка аватарки */
        .avatar-upload-box {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 6px !important;
            width: 100% !important;
        }

        .custom-avatar-btn {
            display: block !important;
            width: 100% !important;
            padding: 12px !important;
            cursor: pointer;
            background: #f8f9fa;
            border: 1px dashed #cbd5e1 !important;
            border-radius: 8px !important;
            font-size: 14px;
            color: #475569;
            box-sizing: border-box !important;
            transition: background 0.2s;
        }

        .custom-avatar-btn:hover {
            background: #f1f5f9;
            border-color: #3498db !important;
        }

        #file-name-text {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Главная кнопка */
        .submit-btn-fixed { 
            width: 100% !important; 
            padding: 14px !important; 
            border: none !important;
            border-radius: 8px !important; 
            background: #2c3e50 !important; 
            color: white !important;
            font-size: 16px !important;
            font-weight: bold !important;
            cursor: pointer;
            box-sizing: border-box !important;
            margin: 5px 0 0 0 !important;
            transition: background 0.2s;
        }

        .submit-btn-fixed:hover { 
            background: #1a252f !important; 
        }

        .footer-link { 
            font-size: 14px; 
            margin: 5px 0 0 0;
            color: #64748b;
        }

        .footer-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="new-auth-card">
        <h2>Создать профиль</h2>
        
        <!-- Убрали action и method, добавили id для JS обработки -->
        <form id="registerForm" enctype="multipart/form-data">
            <!-- Поля ввода -->
            <input type="text" name="username" placeholder="Придумайте имя" required>
            <input type="password" name="password" placeholder="Придумайте пароль" required>
            
            <!-- Загрузка фото -->
            <div class="avatar-upload-box">
                <label for="avatar-file" class="custom-avatar-btn">
                    🖼️ Выбрать аватарку
                </label>
                <input id="avatar-file" type="file" name="avatar" accept="image/*" style="display: none !important;">
                <span id="file-name-text">Файл не выбран</span>
            </div>
            
            <!-- Кнопка -->
            <button type="submit" class="submit-btn-fixed">Зарегистрироваться</button>
        </form>
        
        <p class="footer-link">Уже есть аккаунт? <a href="/login.html">Войти</a></p>
    </div>

    <script>
        const fileInput = document.getElementById('avatar-file');
        const fileNameText = document.getElementById('file-name-text');
        const registerForm = document.getElementById('registerForm');

        // 1. Код для обновления названия файла при выборе на компьютере/телефоне
        fileInput.addEventListener('change', function() {
            const labelText = this.files.length > 0 ? this.files[0].name : 'Файл не выбран';
            fileNameText.textContent = labelText;
        });

        // 2. Асинхронная AJAX отправка формы на ваш Node.js бэкенд
        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault(); // Останавливаем перезагрузку страницы браузером

            // Автоматически собираем все данные из формы (текст и файлы)
            const formData = new FormData(registerForm);

            // !!! ВНИМАНИЕ: Замените этот URL на адрес вашего реального бэкенда !!!
            const BACKEND_URL = 'https://xn-----6kcfcemhcb3cxb4bck8hyd.com'; 

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData // Передаем объект FormData в теле запроса
                });

                if (response.ok) {
                    const data = await response.json();
                    alert('Регистрация прошла успешно!');
                    window.location.href = '/login.html'; // Перенаправление на страницу логина
                } else {
                    // Обработка ошибок, если бэкенд вернул код 400, 409, 500 и т.д.
                    const errorData = await response.json();
                    alert('Ошибка: ' + (errorData.message || 'Не удалось зарегистрироваться'));
                }
            } catch (error) {
                console.error('Ошибка сети:', error);
                alert('Не удалось подключиться к серверу. Убедитесь, что бэкенд запущен и включен CORS.');
            }
        });
    </script>

</body>
</html>

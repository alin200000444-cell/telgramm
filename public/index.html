<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер Telegram Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="messenger-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="my-avatar" src="" style="width:34px; height:34px; border-radius:50%; object-fit:cover; display:none;">
                    <span id="user-display">Вы: ...</span>
                </div>
                <a href="/logout" class="logout-btn">Выйти</a>
            </div>
            <ul id="users-list"></ul>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chat-header-title">Выберите чат или собеседника слева</div>
            <ul id="messages"></ul>
            <form id="form" action="" style="display: none; position: relative;">
                <button type="button" id="emoji-btn" style="background: none; color: #3390ec; margin: 0 5px; padding: 0; width: auto; cursor: pointer; font-size: 22px; border: none; outline: none;">😊</button>
                
                <input id="input" autocomplete="off" placeholder="Написать сообщение..." />
                <button type="submit">Отправить</button>
                <div id="emoji-picker" style="display: none; position: absolute; bottom: 70px; left: 20px; background: #ffffff; border: 1px solid #e4e4e7; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); width: 340px; height: 280px; overflow-y: auto; padding: 12px; z-index: 1000; box-sizing: border-box;">
                    <div style="font-size: 12px; color: #a1a1aa; margin-bottom: 8px; font-weight: bold; text-align: left;">Ваши эмодзи и мемы</div>
                    <div class="emoji-list" id="custom-emojis-container">
                    </div>
                </div>
            </form>
        </div>
    </div>

<script type="module">
    // Импортируем официальный клиент Supabase напрямую через CDN (работает без Node.js)
    import { createClient } from 'https://esm.sh'

    // 1. ИНИЦИАЛИЗАЦИЯ SUPABASE
    const SUPABASE_URL = 'https://supabase.co'; 
    const SUPABASE_KEY = 'ВАШ_ANON_KEY_ИЗ_SUPABASE'; // <-- Вставьте сюда ваш anon/public key

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUserId = null;
    let currentUsername = '';
    let activeChatUser = null;      // Хранит UUID собеседника из таблицы profiles
    let activeChatUsername = '';  // Хранит имя собеседника
    let customEmojisList = [];     // Имена файлов мемов, например: ['meme1.png', 'kappa.gif']

    // Конвертер коротких кодов (например, :fire.gif:) в картинки внутри текста
    function convertCustomEmojis(text) {
        let result = text;
        if (!customEmojisList || customEmojisList.length === 0) return result;
        customEmojisList.forEach(fileName => {
            const shortcode = `:${fileName}:`;
            if (result.includes(shortcode)) {
                const imgTag = `<img src="emojis/${fileName}" style="width:24px;height:24px;display:inline-block;vertical-align:-5px;margin:0 2px;object-fit:contain;">`;
                result = result.split(shortcode).join(imgTag);
            }
        });
        return result;
    }

    // 2. ПРОВЕРКА АВТОРИЗАЦИИ ПОЛЬЗОВАТЕЛЯ
    async function checkAuth() {
        const { data: { user } } = await supabase.auth.getUser();
        
        // Если пользователь не авторизован в Supabase Auth, перекидываем на форму входа
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        currentUserId = user.id;

        // Подгружаем имя и аватарку вошедшего пользователя из таблицы profiles
        const { data: profile } = await supabase
            .from('profiles')
            .select('username, avatar_url')
            .eq('id', currentUserId)
            .single();

        if (profile) {
            currentUsername = profile.username;
            document.getElementById('user-display').textContent = currentUsername;
            
            const myAvatar = document.getElementById('my-avatar');
            if (profile.avatar_url) {
                myAvatar.src = profile.avatar_url;
                myAvatar.style.display = 'block';
            }
        }

        // Эмуляция получения списка мемов (на GitHub Pages читаем массив вручную)
        // Вы можете вписать сюда названия ваших картинок, загруженных в папку emojis/
        customEmojisList = ['smile.png', 'fire.gif', 'like.png']; 

        // Запускаем мессенджер
        initMessenger();
    }

    checkAuth();

    // 3. ГЛАВНАЯ ЛОГИКА МЕССЕНДЖЕРА
    function initMessenger() {
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const usersList = document.getElementById('users-list');
        const chatHeaderTitle = document.getElementById('chat-header-title');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPicker = document.getElementById('emoji-picker');
        const customEmojisContainer = document.getElementById('custom-emojis-container');

        // Обработка кнопки выхода из аккаунта
        document.querySelector('.logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        // Отрисовка списка кастомных мемов (эмодзи) в панели
        customEmojisContainer.innerHTML = '';
        if (!customEmojisList || customEmojisList.length === 0) {
            customEmojisContainer.innerHTML = '<div style="font-size:12px;color:#a1a1aa;width:100%;text-align:left;">Папка emojis пуста.</div>';
        } else {
            customEmojisContainer.style.display = 'grid';
            customEmojisContainer.style.gridTemplateColumns = 'repeat(auto-fill, minmax(60px, 1fr))';
            customEmojisContainer.style.gap = '10px';
            customEmojisContainer.style.width = '100%';
            
            customEmojisList.forEach(fileName => {
                const img = document.createElement('img');
                img.src = `emojis/${fileName}`;
                img.style.setProperty('width', '60px', 'important');
                img.style.setProperty('height', '60px', 'important');
                img.style.cursor = 'pointer';
                img.style.objectFit = 'contain';
                img.style.borderRadius = '6px';
                img.style.transition = 'transform 0.15s ease';
                img.title = fileName;
                
                img.addEventListener('mouseenter', () => img.style.setProperty('transform', 'scale(1.1)', 'important'));
                img.addEventListener('mouseleave', () => img.style.setProperty('transform', 'scale(1.0)', 'important'));
                
                // Клик по мему — отправляем его как код `:имя_файла:`
                img.addEventListener('click', () => {
                    if (activeChatUser) {
                        sendMessage(`:${fileName}:`);
                        emojiPicker.style.display = 'none';
                    }
                });
                customEmojisContainer.appendChild(img);
            });
        }

        // Переключение видимости панели смайликов
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => { emojiPicker.style.display = 'none'; });
        emojiPicker.addEventListener('click', (e) => { e.stopPropagation(); });

        // Загрузка списка пользователей (контакты слева)
        async function loadUsers() {
            const { data: users, error } = await supabase
                .from('profiles')
                .select('*')
                .neq('id', currentUserId); // Отображаем всех, кроме себя

            if (error) return;

            usersList.innerHTML = '';
            users.forEach(user => {
                const li = document.createElement('li');
                
                const img = document.createElement('img');
                img.src = user.avatar_url || 'https://placeholder.com';
                img.classList.add('user-avatar-modern');
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = user.username;
                nameSpan.style.fontSize = '15px';
                nameSpan.style.fontWeight = '500';
                
                li.appendChild(img);
                li.appendChild(nameSpan);

                if (activeChatUser === user.id) li.classList.add('active');

                // Клик по пользователю — открываем окно чата с ним
                li.addEventListener('click', () => {
                    activeChatUser = user.id;
                    activeChatUsername = user.username;
                    document.querySelectorAll('#users-list li').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    
                    chatHeaderTitle.innerHTML = `
                        <div style="display:flex;align-items:center;gap:12px;">
                            <img src="${user.avatar_url || 'https://placeholder.com'}" class="chat-header-avatar">
                            <span style="font-size:16px;"><strong>${activeChatUsername}</strong></span>
                        </div>
                    `;
                    form.style.display = 'flex';
                    
                    loadChatHistory();
                });

                usersList.appendChild(li);
            });
        }
        loadUsers();

        // Загрузка всей истории сообщений для выбранного приватного чата
        async function loadChatHistory() {
            messages.innerHTML = '';
            
            // Фильтруем сообщения: (Я отправлял -> Ему) ИЛИ (Он отправлял -> Мне)
            const { data: chatData, error } = await supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${activeChatUser}),and(sender_id.eq.${activeChatUser},receiver_id.eq.${currentUserId})`)
                .order('created_at', { ascending: true });

            if (!error && chatData) {
                chatData.forEach(appendMessage);
            }
        }

        // Отправка сообщений по кнопке или Enter
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text || !activeChatUser) return;
            
            input.value = '';
            await sendMessage(text);
        });

        // Функция вставки новой строки в таблицу БД Supabase
        async function sendMessage(text) {
            const { error } = await supabase
                .from('messages')
                .insert([{ 
                    sender_id: currentUserId, 
                    receiver_id: activeChatUser, 
                    text: text 
                }]);
            if (error) console.error('Ошибка отправки:', error.message);
        }

        // Вспомогательная функция для создания кнопки удаления (только для VADMIN)
        const createDeleteButton = (messageId) => {
            const delBtn = document.createElement('button');
            delBtn.classList.add('delete-msg-btn');
            delBtn.addEventListener('click', async () => {
                if (confirm('Вы уверены, что хотите удалить это сообщение?')) {
                    const { error } = await supabase
                        .from('messages')
						                        .delete()
                        .eq('id', messageId);
                    if (error) alert('Ошибка при удалении: ' + error.message);
                }
            });
            return delBtn;
        };

        // Функция добавления элемента сообщения на страницу в реальном времени
        function appendMessage(data) {
            const item = document.createElement('li');
            item.id = `msg-${data.id}`;
            
            if (data.sender_id === currentUserId) {
                item.classList.add('my-msg');
            }

            const date = data.created_at ? new Date(data.created_at) : new Date();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const timeString = `${hours}:${minutes}`;
            const trimmedText = String(data.text).trim();
            
            const isSingleEmoji = /^:[^:]+:$/.test(trimmedText);
            
            // 1. ОТРЕНДЕРИТЬ ЕСЛИ ЭТО БОЛЬШОЙ МЕМ (КАСТОМНЫЙ ЭМОДЗИ)
            if (isSingleEmoji) {
                const fileName = trimmedText.replace(/:/g, '');
                if (customEmojisList.includes(fileName)) {
                    item.style.background = 'none';
                    item.style.boxShadow = 'none';
                    item.style.border = 'none';
                    item.style.padding = '0';
                    item.style.position = 'relative';
                    item.innerHTML = `
                        <div style="position:relative; display:inline-block;">
                            <img src="emojis/${fileName}" style="width:200px; height:auto; border-radius:12px; display:block; object-fit:contain;">
                            <span style="position:absolute; bottom:8px; right:10px; background:rgba(0,0,0,0.5); color:white; padding:2px 6px; border-radius:10px; font-size:11px; user-select:none;">${timeString}</span>
                        </div>
                    `;
                    
                    if (currentUsername === 'VADMIN') {
                        const btn = createDeleteButton(data.id);
                        btn.textContent = 'Удалить мем';
                        btn.style.display = 'block';
                        btn.style.marginTop = '5px';
                        item.appendChild(btn);
                    }
                    
                    messages.appendChild(item);
                    messages.scrollTop = messages.scrollHeight;
                    return; 
                }
            }

            // 2. ОТРЕНДЕРИТЬ ЕСЛИ ЭТО ОБЫЧНОЕ ТЕКСТОВОЕ СООБЩЕНИЕ
            const processedText = convertCustomEmojis(trimmedText);
            const senderName = data.sender_id === currentUserId ? currentUsername : activeChatUsername;
            
            item.innerHTML = `
                <strong>${senderName}</strong>
                <div style="display: flex; flex-direction: column; gap: 2px;">
                    <span>${processedText}</span>
                    <span style="font-size: 10px; color: #a1a1aa; align-self: flex-end; margin-top: 2px; user-select: none;">${timeString}</span>
                </div>
            `;
            
            if (currentUsername === 'VADMIN') {
                const btn = createDeleteButton(data.id);
                btn.textContent = '✖';
                item.appendChild(btn);
            }

            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        }

        // 4. ЖИВАЯ СВЯЗЬ ЧЕРЕЗ ВЕБ-СОКЕТЫ SUPABASE REALTIME
        supabase
            .channel('public:messages')
            // Слушаем создание новых сообщений в базе
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const newMsg = payload.new;
                if ((newMsg.sender_id === activeChatUser && newMsg.receiver_id === currentUserId) || 
                    (newMsg.sender_id === currentUserId && newMsg.receiver_id === activeChatUser)) {
                    appendMessage(newMsg);
                }
            })
            // Слушаем удаление строк из базы (когда VADMIN жмет крестик)
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
                const deletedMsgId = payload.old.id;
                const msgElement = document.getElementById(`msg-${deletedMsgId}`);
                if (msgElement) {
                    msgElement.style.opacity = '0.3';
                    msgElement.innerHTML = '<em>Сообщение удалено администратором VADMIN</em>';
                }
            })
            .subscribe();
            
        // Раз в 10 секунд синхронизируем список контактов на случай регистрации новых людей
        setInterval(loadUsers, 10000);
    }
</script>
</body>
</html>
